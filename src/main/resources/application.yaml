spring:
  application:
    name: proyecto-final-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/northwind
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: true
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 900 # 15 minutes
    refreshTokenExpiration: 604800 # 7 days